        let kasicka = 0
        let penize
        do{
            penize = Number(window.prompt("Kolik peněz přidáš do kasičky?"))
            kasicka += penize // kasicka = kasicka + penize
            if(Math.floor(Math.random() * 5) == 1){
                kasicka = 0
                alert("Přišel zloděj a utratil ti všechny peníze za drogy")
            }
        }while(kasicka < 500)
        alert("Kasička obsahuje 500 korun a zbylo nám " + (kasicka - 500))
