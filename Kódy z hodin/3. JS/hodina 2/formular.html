<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="formular">Zadej hodnotu: </label>
        <input type="text" id="formular">
        <button type="button" id="tlac">Odeslat</button>
    </form>

    <script>
        let button = document.getElementById("tlac")
        let input = document.getElementById("formular")

        function jmenoFunkce(){
            let text = input.value
            alert(text)
        }
        button.addEventListener("click", jmenoFunkce)

    </script>
</body>
</html>
