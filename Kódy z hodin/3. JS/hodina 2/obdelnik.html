<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obdélník</title>
</head>
<body>
    <script>
        let a = window.prompt("Zadej stranu a")
        let b = window.prompt("Zadej stranu b")
        let o = 2 * a + 2 * b
        let s = a * b
        alert("Obvod obdélníku je " + o + " a obsah je " + s) 
    </script>
</body>
