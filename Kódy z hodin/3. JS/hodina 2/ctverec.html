<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Čtverec</title>
</head>
<body>
    <script>
        let strana = window.prompt("Zadej délku strany")
        let o = 4 * strana
        let s = strana * strana
        alert("Obvod čtverce je " + o + " a obsah je " + s)
    </script>
</body>
