<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podmínky</title>
    <script>
        /*
        if(porovnání hodnot){
            tělo podmínky
        }
        */

        let cislo = parseFloat(window.prompt("Zadej číslo")) // přetypování vstupu od uživatele na float
        
        if(cislo > 10){
            alert("Zadané číslo je větší než 10")
        }else if(cislo == 10){
            alert("Zadané číslo je 10")
        }else{
            alert("Zadané číslo je menší než 10")
        }

        /* 
        Porovnávací operátory: 
        > < == != <= >= ===

        if(1 == "1") -> True
        if(1 === "1") -> False

        if(cislo > 18 && cislo < 12){ 
            Číslo musí být větší než 18 A ZÁROVEŇ menší než 12
        }
        if(cislo > 18 || cislo < 12){
            Číslo musí být větší než 18 NEBO menší než 12
        }
        */


    </script>
</head>
